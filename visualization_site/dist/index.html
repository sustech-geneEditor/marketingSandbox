        <article>
          <h1>沙盘网站需要先启动本地网页服务</h1>
          <p>
            如果你是直接双击这个 <strong>index.html</strong> 打开的，Vite 模块和 Three.js 依赖通常不会被正确加载，页面会停在这里。
          </p>
          <ol>
            <li>在项目终端进入 <strong>visualization_site</strong>。</li>
            <li>第一次运行先安装前端依赖。</li>
            <li>启动前端服务，再打开终端给出的本地地址。</li>
          </ol>
          <pre>cd visualization_site
npm install
npm run dev</pre>
          <p>打开地址通常是 <strong>http://127.0.0.1:5173/</strong>。</p>
          <small>
            只看示例回放或课堂数据包时，前端服务就够了。要跑真实模型搜索，还需要本地后端提供 live event 接口。
